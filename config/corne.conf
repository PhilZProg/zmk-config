# Enable RGB underglow
CONFIG_ZMK_RGB_UNDERGLOW=y

# Default effect index from the effect list (see below)
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=3
# Values for CONFIG_ZMK_RGB_UNDERGLOW_EFF_START:
# | Value	| Effect      |
# | 0	    | Solid color |
# | 1	    | Breathe     |
# | 2	    | Spectrum    |
# | 3	    | Swirl       |

# Default brightness in percent (0-100)
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=100

# Default effect speed (1-5)
CONFIG_ZMK_RGB_UNDERGLOW_SPD_START=2

# Enable support for displays
# CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
# CONFIG_ZMK_DISPLAY_INVERT=y

# Use a dedicated thread for UI updates
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
# CONFIG_ZMK_DISPLAY_WORK_QUEUE_SYSTEM=y

# Enable a widget to show battery charge information
# CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
# CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y

# Enable a widget to show words per minute
# CONFIG_ZMK_WIDGET_WPM_STATUS=y

# Enable a widget to show the current output (USB/BLE)
# CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y

# Maximum value of the fixed range to align with your current goal.
# CONFIG_NICE_OLED_GEM_WPM_FIXED_RANGE_MAX=70

# Turn animation on/off
# CONFIG_NICE_OLED_GEM_ANIMATION=y
#
# CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y

# Mouse Emulation
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_EXT_POWER=y

CONFIG_NICE_OLED_WIDGET_STATUS=y

CONFIG_NICE_OLED_WIDGET_WPM_GRAPH=y


CONFIG_NICE_OLED_WIDGET_WPM_BONGO_CAT=y

CONFIG_NICE_OLED_SHOW_SLEEP_ART_ON_IDLE=y

CONFIG_NICE_OLED_SHOW_SLEEP_ART_ON_SLEEP=y

# CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_SMART_BATTERY=y
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_POKEMON=y


CONFIG_NICE_OLED_WIDGET_HID_INDICATORS_BONGO_CAT=y


